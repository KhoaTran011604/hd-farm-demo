<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD-FARMS Mobile — Quét QR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#E5E7EB;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:24px;gap:24px}
.device-frame{width:390px;height:844px;background:#000;border-radius:44px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.25),0 0 0 12px #1A1A1A,0 0 0 14px #333;position:relative;display:flex;flex-direction:column}

/* CAMERA BG */
.camera-bg{position:absolute;inset:0;background:linear-gradient(160deg,#1A2A10 0%,#0D1A06 40%,#0A1204 100%)}
.camera-noise{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);pointer-events:none}

/* STATUS BAR */
.status-bar{position:relative;z-index:10;height:50px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 20px 8px}
.status-time{color:white;font-size:15px;font-weight:700}
.status-icons{display:flex;align-items:center;gap:5px}
.status-icons svg{width:15px;height:15px;fill:white}

/* TOP BAR */
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px}
.back-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer}
.back-btn svg{width:20px;height:20px;fill:none;stroke:white;stroke-width:2}
.top-title{color:white;font-size:16px;font-weight:700}
.torch-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer}
.torch-btn svg{width:20px;height:20px;fill:none;stroke:white;stroke-width:1.5}

/* VIEWFINDER */
.viewfinder-wrap{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 16px}
.viewfinder-hint{color:rgba(255,255,255,.7);font-size:13px;text-align:center;margin-bottom:20px}
.viewfinder{width:240px;height:240px;position:relative}
/* Corner brackets */
.corner{position:absolute;width:28px;height:28px}
.corner-tl{top:0;left:0;border-top:3px solid white;border-left:3px solid white;border-radius:4px 0 0 0}
.corner-tr{top:0;right:0;border-top:3px solid white;border-right:3px solid white;border-radius:0 4px 0 0}
.corner-bl{bottom:0;left:0;border-bottom:3px solid white;border-left:3px solid white;border-radius:0 0 0 4px}
.corner-br{bottom:0;right:0;border-bottom:3px solid white;border-right:3px solid white;border-radius:0 0 4px 0}
/* Dim overlay sides */
.dim-top{position:absolute;left:-75px;right:-75px;top:-100px;height:100px;background:rgba(0,0,0,.65)}
.dim-bottom{position:absolute;left:-75px;right:-75px;bottom:-140px;height:140px;background:rgba(0,0,0,.65)}
.dim-left{position:absolute;top:0;left:-75px;width:75px;bottom:0;background:rgba(0,0,0,.65)}
.dim-right{position:absolute;top:0;right:-75px;width:75px;bottom:0;background:rgba(0,0,0,.65)}
/* Scan line */
.scan-line{position:absolute;left:2px;right:2px;height:2px;background:linear-gradient(90deg,transparent,#7CB518,#7CB518,transparent);border-radius:1px;animation:scan 2s ease-in-out infinite;box-shadow:0 0 8px #7CB518}
@keyframes scan{0%{top:4px;opacity:1}50%{top:232px;opacity:1}100%{top:4px;opacity:1}}
/* Center dot -->*/
.scan-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:#7CB518;box-shadow:0 0 0 4px rgba(124,181,24,.25),0 0 0 8px rgba(124,181,24,.1)}

/* FALLBACK BUTTON */
.fallback-btn{margin-top:20px;height:44px;padding:0 20px;border-radius:22px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.1);backdrop-filter:blur(8px);color:white;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit}
.fallback-btn svg{width:16px;height:16px;fill:none;stroke:white;stroke-width:1.5}

/* RECENT SCANS */
.recent-section{position:relative;z-index:10;padding:0 16px;margin-top:12px}
.recent-label{color:rgba(255,255,255,.5);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.recent-items{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.recent-items::-webkit-scrollbar{display:none}
.recent-chip{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:20px;padding:6px 12px;white-space:nowrap;color:white;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}

/* BOTTOM SHEET (result state) */
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.3);z-index:20;display:flex;align-items:flex-end}
.bottom-sheet{background:white;border-radius:20px 20px 0 0;width:100%;padding-bottom:16px}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:#D1D5DB;margin:10px auto 16px}
.sheet-animal{display:flex;align-items:center;gap:12px;padding:0 20px 16px;border-bottom:1px solid #F3F4F6}
.sheet-icon{width:52px;height:52px;border-radius:12px;background:#F0FDF4;border:2px solid #DCFCE7;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#16A34A;flex-shrink:0}
.sheet-info{flex:1}
.sheet-id{font-size:12px;color:#9CA3AF;font-weight:600;font-family:monospace}
.sheet-name{font-size:18px;font-weight:800;color:#1A2E0A;margin-top:1px}
.sheet-meta{display:flex;gap:10px;margin-top:4px}
.sheet-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:11.5px;font-weight:600;background:#DCFCE7;color:#16A34A}
.sheet-badge-dot{width:5px;height:5px;border-radius:50%;background:#16A34A}
.sheet-zone{font-size:12px;color:#9CA3AF;font-weight:500;margin-top:2px}

/* QUICK ACTIONS */
.quick-actions{padding:14px 16px;display:flex;gap:8px;overflow-x:auto}
.quick-actions::-webkit-scrollbar{display:none}
.qa-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;min-width:64px}
.qa-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.qa-icon svg{width:24px;height:24px;fill:none;stroke-width:1.5}
.qa-label{font-size:11px;font-weight:700;color:#4B5563;text-align:center}

.annotation{position:fixed;bottom:8px;right:8px;background:#1A3009;color:#C5E09B;font-size:10px;padding:6px 10px;border-radius:6px;opacity:.85}
</style>
</head>
<body>

<div class="device-frame">
  <div class="camera-bg"></div>
  <div class="camera-noise"></div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-time">8:32</div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1.5 8.5a13 13 0 0 1 21 0M5 12a10 10 0 0 1 14 0M8.5 15.5a6 6 0 0 1 7 0M12 19h.01"/></svg>
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="11" rx="2"/><path d="M22 11v3"/></svg>
    </div>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="back-btn">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="top-title">Quét mã QR</div>
    <div class="torch-btn">
      <svg viewBox="0 0 24 24"><path d="M9 2h6l1 7H8L9 2zM8 9v3a4 4 0 0 0 8 0V9M12 16v6M10 22h4"/></svg>
    </div>
  </div>

  <!-- VIEWFINDER -->
  <div class="viewfinder-wrap">
    <div class="viewfinder-hint">Đưa mã QR vào khung để quét tự động</div>
    <div class="viewfinder">
      <!-- Dim sides -->
      <div class="dim-top"></div>
      <div class="dim-bottom"></div>
      <div class="dim-left"></div>
      <div class="dim-right"></div>
      <!-- Corners -->
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <!-- Scan line -->
      <div class="scan-line"></div>
      <!-- Center dot -->
      <div class="scan-dot"></div>
    </div>

    <!-- Fallback button -->
    <button class="fallback-btn">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v4M9 3H5a2 2 0 0 0-2 2v4M15 21h4a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4"/></svg>
      Tìm theo số hiệu
    </button>
  </div>

  <!-- RECENT SCANS -->
  <div class="recent-section">
    <div class="recent-label">Quét gần đây</div>
    <div class="recent-items">
      <div class="recent-chip">A-003</div>
      <div class="recent-chip">B-007</div>
      <div class="recent-chip">A-012</div>
      <div class="recent-chip">C-041</div>
      <div class="recent-chip">B-023</div>
    </div>
  </div>

  <!-- BOTTOM SHEET — result after scan -->
  <div class="sheet-backdrop">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>

      <!-- Animal info -->
      <div class="sheet-animal">
        <div class="sheet-icon">A3</div>
        <div class="sheet-info">
          <div class="sheet-id">A-003</div>
          <div class="sheet-name">Heo #A-003</div>
          <div class="sheet-meta">
            <span class="sheet-badge"><span class="sheet-badge-dot"></span>Khỏe mạnh</span>
            <span style="font-size:12px;color:#9CA3AF;align-self:center">87.4 kg · 97 ngày</span>
          </div>
          <div class="sheet-zone">Khu A — Chuồng 2 · Lô A-2026-01</div>
        </div>
        <div style="cursor:pointer;padding:4px">
          <svg viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" width="18" height="18"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>

      <!-- Quick action buttons -->
      <div class="quick-actions">
        <div class="qa-btn">
          <div class="qa-icon" style="background:#FEF3C7">
            <svg viewBox="0 0 24 24" stroke="#D97706"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </div>
          <div class="qa-label">Cân</div>
        </div>
        <div class="qa-btn">
          <div class="qa-icon" style="background:#DBEAFE">
            <svg viewBox="0 0 24 24" stroke="#2563EB"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </div>
          <div class="qa-label">Vaccine</div>
        </div>
        <div class="qa-btn">
          <div class="qa-icon" style="background:#DCFCE7">
            <svg viewBox="0 0 24 24" stroke="#16A34A"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <div class="qa-label">Sức khỏe</div>
        </div>
        <div class="qa-btn">
          <div class="qa-icon" style="background:#FFF7ED">
            <svg viewBox="0 0 24 24" stroke="#EA580C"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
          </div>
          <div class="qa-label">Cho ăn</div>
        </div>
        <div class="qa-btn">
          <div class="qa-icon" style="background:#F3F4F6">
            <svg viewBox="0 0 24 24" stroke="#6B7280"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="qa-label">Hồ sơ</div>
        </div>
      </div>

      <!-- CTA button -->
      <div style="padding:4px 16px 8px">
        <button style="width:100%;height:48px;background:#2D5016;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" width="18" height="18"><path d="M9 18l6-6-6-6"/></svg>
          Xem chi tiết đầy đủ
        </button>
      </div>
    </div>
  </div>
</div>

<div class="annotation">Wireframe — HD-FARMS QR Scanner v1.0 · 390px</div>
</body>
</html>
